name: 自動実装リクエスト
description: Claude Codeに自動実装してもらうissue
labels: ["claude-implement"]
body:
  - type: textarea
    id: requirements
    attributes:
      label: 要件
      description: 実装したい内容を具体的に記述してください
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: 影響範囲
      options:
        - front
        - back
        - front + back
        - mobile
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件
      description: 完了条件を箇条書きで記述してください
    validations:
      required: false
