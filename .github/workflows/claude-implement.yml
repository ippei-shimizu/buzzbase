name: Claude Auto-Implement

on:
  issues:
    types: [labeled]

concurrency:
  group: claude-implement-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: github.event.label.name == 'claude-implement'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}

    services:
      postgres:
        image: postgres:15.5
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true
          working-directory: back

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: front/yarn.lock

      - name: Install frontend dependencies
        run: cd front && yarn install --frozen-lockfile

      - name: Setup backend database
        run: cd back && bundle exec rails db:schema:load
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://user:password@localhost:5432/app_test

      - name: Configure Git for submodule push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cd front && git remote set-url origin "https://x-access-token:${PAT}@github.com/ippei-shimizu/buzzbase_front.git"
          cd ../back && git remote set-url origin "https://x-access-token:${PAT}@github.com/ippei-shimizu/buzzbase_back.git"
        env:
          PAT: ${{ secrets.PAT_TOKEN }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            あなたはBUZZ BASEの自動実装エージェントです。
            Issue #${{ github.event.issue.number }} を実装してPRを作成してください。

            ## プロジェクト構造
            - front/ -> Next.js (ippei-shimizu/buzzbase_front)
            - back/ -> Rails API (ippei-shimizu/buzzbase_back)
            - CLAUDE.md とサブモジュールのCLAUDE.mdを必ず読んでルールに従うこと

            ## 実装手順（TDD: Red->Green->Refactor）
            1. このissueの要件を `gh issue view ${{ github.event.issue.number }}` で確認
            2. CLAUDE.md、front/CLAUDE.md、back/CLAUDE.md を読む
            3. .claude/rules/ubiquitous-language.md を読んでドメイン用語を確認
            4. 変更対象を特定（front/back/both）
            5. **Red: 先にテストを書く**
               - back/の変更がある場合:
                 - .claude/skills/rspec-behavior-test/SKILL.md を読んで方針に従う
                 - 古典派テスト（振る舞いテスト）でRSpecを書く
                 - テストが失敗することを確認: cd back && RAILS_ENV=test DATABASE_URL=postgres://user:password@localhost:5432/app_test bundle exec rspec
               - front/の変更がある場合:
                 - Jestでテストを書く
                 - テストが失敗することを確認: cd front && yarn test:ci
            6. **Green: テストを通す最小限の実装を書く**
            7. **Refactor: コードを整理する**
            8. 全テスト・Lintを実行して確認:
               - back/: cd back && RAILS_ENV=test DATABASE_URL=postgres://user:password@localhost:5432/app_test bundle exec rspec && bundle exec rubocop
               - front/: cd front && yarn typecheck && yarn lint && yarn test:ci
            9. テスト失敗なら修正を試みる
            10. サブモジュール内でブランチ作成・コミット・push・PR作成

            ## Git ルール（厳守）
            - コミットメッセージは日本語: [Type]: [説明]
            - Type: Add, Fix, Update, Change, Refactor, Remove, Test, Chore, Docs
            - ブランチ名: feature/${{ github.event.issue.number }}-簡潔な英語説明（#禁止）
            - mainに直接pushしない

            ## PR作成手順
            変更があるサブモジュールそれぞれでPRを作成する:

            ```bash
            cd {サブモジュール}
            git checkout -b feature/${{ github.event.issue.number }}-{説明}
            git add -A
            git commit -m "[Type]: {日本語の説明}"
            git push origin feature/${{ github.event.issue.number }}-{説明}
            gh pr create --repo ippei-shimizu/{リポジトリ名} \
              --base stg \
              --title "[Type]: {タイトル}" \
              --body "## 関連Issue
            closes ippei-shimizu/buzzbase#${{ github.event.issue.number }}

            ## 概要
            {実装内容}

            ## テスト結果
            {テスト実行結果のサマリー}

            🤖 Claude Code による自動実装"
            ```

            ## 完了後
            Issue #${{ github.event.issue.number }} にコメントで結果を報告:
            - 作成したPRへのリンク
            - テスト結果のサマリー
            - 実装の概要
          claude_args: >-
            --max-turns 50
            --model claude-sonnet-4-6
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          RAILS_ENV: test
          DATABASE_URL: postgres://user:password@localhost:5432/app_test

      - name: Remove label
        if: always()
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label claude-implement
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
